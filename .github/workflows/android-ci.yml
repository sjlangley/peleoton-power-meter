name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Assemble debug build
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests and coverage checks
        run: ./gradlew testDebugUnitTest jacocoDebugReport jacocoDebugCoverageVerification --no-daemon

      - name: Run Android lint
        run: ./gradlew lintDebug --no-daemon

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run detekt
        run: ./gradlew :app:detekt --no-daemon

      - name: Upload JaCoCo report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-debug-report
          path: app/build/reports/jacoco/jacocoDebugReport/

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          files: app/build/reports/jacoco/jacocoDebugReport/jacocoDebugReport.xml
          flags: unit
          name: android-unit
          token: ${{ env.CODECOV_TOKEN }}
